<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/portal.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">SR</div>
      <div><div class="brand-name" data-i18n="brand.studentPortal">Cổng sinh viên</div><div class="brand-sub" data-i18n="brand.studentSub">Kết quả học tập</div></div>
    </div>
    <div class="topbar-spacer"></div>
    <div id="langMount"></div>
    <div class="bell" id="bell" title="Thông báo" data-ic="bell"><span class="bell-dot" id="bellDot">0</span></div>
    <div class="topbar-user">
      <div class="avatar" id="userAvatar">?</div>
      <div class="who"><b id="userName">…</b><small id="userMeta"></small></div>
      <button class="btn btn-sm" id="logoutBtn" data-i18n="btn.logout">Đăng xuất</button>
    </div>
  </div>

  <div class="container">
    <div class="page-head">
      <div>
        <div class="page-title" id="hello">…</div>
        <div class="page-sub" id="helloSub"></div>
      </div>
    </div>

    <div id="alertBanner"></div>

    <div class="kpi-grid">
      <div class="kpi accent"><div class="kpi-label" data-i18n="kpi.cpa">CPA</div><div class="kpi-value" id="kpiCpa">—</div></div>
      <div class="kpi"><div class="kpi-label" data-i18n="kpi.gpaLatest">GPA</div><div class="kpi-value" id="kpiGpa">—</div></div>
      <div class="kpi"><div class="kpi-label" data-i18n="kpi.creditsAccum">Tín chỉ</div><div class="kpi-value" id="kpiCredits">—</div></div>
      <div class="kpi"><div class="kpi-label" data-i18n="kpi.failedF">Môn F</div><div class="kpi-value" id="kpiFailed">—</div></div>
    </div>

    <div class="grid-2">
      <div>
        <div class="card">
          <div class="card-head"><div class="card-title" data-ic="book" data-i18n="card.transcript">Bảng điểm</div>
            <div class="card-sub" data-i18n="card.transcriptSub">Chỉ xem</div></div>
          <div id="semesters"><div class="empty" data-i18n="loading">Đang tải…</div></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-head"><div class="card-title" data-ic="bell" data-i18n="card.notifications">Thông báo</div>
            <button class="btn btn-sm" id="markAllRead" data-i18n="btn.markAllRead">Đọc hết</button></div>
          <div id="notifList"><div class="empty" data-i18n="loading">Đang tải…</div></div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title" data-ic="message" data-i18n="card.qa">Hỏi đáp</div>
            <div class="card-sub" id="advisorName">—</div></div>
          <div class="chat" id="chat"></div>
          <form class="msg-input" id="msgForm">
            <input type="text" id="msgInput" data-i18n-ph="chat.phStudent" placeholder="…" autocomplete="off" />
            <button class="btn btn-primary" type="submit" data-i18n="btn.send">Gửi</button>
          </form>
          <div class="muted-note" id="chatNote"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/gpa.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/student-app.js"></script>
</body>
</html>
