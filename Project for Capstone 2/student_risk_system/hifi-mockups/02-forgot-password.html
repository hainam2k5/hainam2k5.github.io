<!doctype html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="hifi-common.css"></head><body>
<div class="auth-split">
  <div class="auth-brandpane">
    <div class="abp-topbar">
      <div class="abp-logo-fallback">VNU<br><span>iS</span></div>
      <div class="abp-school">
        <div class="abp-school-1">Trường Quốc tế</div>
        <div class="abp-school-2">Đại học Quốc gia Hà Nội</div>
        <div class="abp-school-3">VNU International School</div>
      </div>
    </div>
    <div class="abp-hero">
      <h1>Phát hiện sớm, hỗ trợ kịp thời.</h1>
      <p>Theo dõi kết quả học tập, cảnh báo rủi ro và kết nối cố vấn — tất cả ở một nơi.</p>
    </div>
    <div class="abp-dots"><span class="abp-dot active"></span><span class="abp-dot"></span><span class="abp-dot"></span><span class="abp-dot"></span></div>
  </div>
  <div class="auth-formpane">
    <div class="auth-langswitch"><div class="lang-switch"><button class="active">VI</button><button>EN</button></div></div>
    <div class="auth-card">
      <div class="auth-title">Đặt lại mật khẩu</div>
      <div class="auth-sub">Nhập mã 6 số đã gửi tới email, sau đó đặt mật khẩu mới.</div>
      <div class="field"><label>Mã xác nhận (6 số)</label><input class="otp-input" value="482917"></div>
      <div class="field"><label>Mật khẩu mới</label><input type="password" value="password"></div>
      <div class="field" style="margin-bottom:8px"><label>Xác nhận mật khẩu mới</label><input type="password" value="password"></div>
      <button class="btn btn-primary btn-block">Cập nhật mật khẩu</button>
      <div class="auth-back"><button class="link-btn">← Quay lại đăng nhập</button></div>
    </div>
  </div>
</div>
</body></html>
